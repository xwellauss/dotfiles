font_family      JetBrainsMono NFM Bold
bold_font        JetBrainsMono NFM Bold
italic_font      JetBrainsMono NFM Italic
bold_italic_font JetBrainsMono NFM Italic

font_size 13

allow_remote_control yes

cursor_shape block
enable_audio_bell no

open_url_with default
detect_urls yes

remember_window_size  yes
initial_window_width  640
initial_window_height 400

# Color Scheme
cursor #ffffff
cursor_text_color #000000
# Black
color0 #000000
color8 #666666
# Red
color1 #cd3131
color9 #f14c4c
# Green
color2  #0dbc79
color10 #23d18b
# Yellow
color3  #e5e510
color11 #f6f643
# Blue
color4  #2472c8
color12 #3b8eea
# Magenta
color5  #bc3fbc
color13 #d670d6
# Cyan
color6  #11a8cd
color14 #29b8db
# white 
color7  #ffffff
color15 #e4e4e4

foreground #ffffff
background #111111

#background_image /home/techie-guy/Downloads/background1.png
background_image_layout scaled

selection_foreground #ffffff
selection_background #264f78

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3
# reset all windows in the tab to default sizes
#map ctrl+home resize_window reset

enabled_layouts tall:bias=70;full_size=1;mirrored=false

map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down
